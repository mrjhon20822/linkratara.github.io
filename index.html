<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RATARA SMP</title>

  <!-- FONT AWESOME -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<div id="navbar"></div>

<!-- SIDEBAR -->
<div id="sidebar-container"></div>

<div class="container">

  <!-- NOTIF -->
  <div id="notif" class="notif">
    <i class="fas fa-check-circle"></i>
    <span>Berhasil menyalin ke clipboard!</span>
  </div>

  <!-- LOGO -->
  <img src="https://i.imgur.com/t8J1411.png" class="logo">

  <!-- BUTTON -->
  <button class="btn main" onclick="copyIP()">
    <i class="fas fa-play"></i> Join Now
  </button>

  <a href="https://discord.gg/qphKqEZCUs" target="_blank" class="btn outline">
    <i class="fab fa-discord"></i> Join Discord
  </a>

  <a href="https://chat.whatsapp.com/F7QL2jqqWLVLqv5TCL42AK?mode=gi_t" target="_blank" class="btn outline">
    <i class="fab fa-whatsapp"></i> Join Grup WhatsApp
  </a>

  <!-- INFO -->
  <div class="card">
    <i class="fas fa-gamepad icon"></i>
    <div>
      <p class="label">Version</p>
      <h2>1.21.4</h2>
    </div>
  </div>

  <div class="card">
    <i class="fas fa-server icon"></i>
    <div>
      <p class="label">Player Register</p>
      <h2>70+</h2>
    </div>
  </div>

  <div class="card">
    <i class="fas fa-network-wired icon"></i>
    <div>
      <p class="label">Bedrock Port</p>
      <h2>19132</h2>
    </div>
  </div>

</div>

<!-- LOAD COMPONENT -->
<script>
fetch('navbar.html')
  .then(res => res.text())
  .then(data => {
    document.getElementById('navbar').innerHTML = data;
  });

fetch('sidebar.html')
  .then(res => res.text())
  .then(data => {
    document.getElementById('sidebar-container').innerHTML = data;
  });
</script>

<script src="script.js"></script>
</body>
</html>
